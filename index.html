<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADATRO — Navigate Africa Smarter</title>
<meta name="description" content="ADATRO is the next-generation AI navigation platform built for Africa — real-time traffic, multilingual voice guidance, and advanced road safety.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<style>
  :root{
    --blue:#0D47A1;
    --blue-light:#2f6fe0;
    --green:#00C853;
    --bg:#050816;
    --bg2:#080b1f;
    --card:rgba(255,255,255,0.05);
    --card-border:rgba(255,255,255,0.09);
    --text:#f5f7ff;
    --muted:#8b93b0;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html{scroll-behavior:smooth;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    overflow-x:hidden;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,h4,.font-display{font-family:'Space Grotesk',sans-serif;}
  .mono{font-family:'JetBrains Mono',monospace;}
  ::selection{background:var(--green); color:#03110a;}
  a{color:inherit; text-decoration:none;}
  :focus-visible{outline:2px solid var(--green); outline-offset:3px; border-radius:4px;}

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.01ms !important; animation-iteration-count:1 !important; transition-duration:0.01ms !important; scroll-behavior:auto !important;}
  }

  .wrap{max-width:1240px; margin:0 auto; padding:0 24px;}
  .eyebrow{
    display:inline-flex; align-items:center; gap:8px;
    font-family:'JetBrains Mono',monospace; font-size:12px; letter-spacing:.14em; text-transform:uppercase;
    color:var(--green); margin-bottom:16px;
  }
  .eyebrow::before{content:''; width:6px; height:6px; border-radius:50%; background:var(--green); box-shadow:0 0 10px var(--green);}

  .grad-text{
    background:linear-gradient(100deg,#ffffff 20%, var(--green) 55%, var(--blue-light) 85%);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    background-size:200% auto;
    animation:sheen 6s ease-in-out infinite;
  }
  @keyframes sheen{0%,100%{background-position:0% center;}50%{background-position:100% center;}}

  .btn{
    display:inline-flex; align-items:center; gap:10px;
    padding:15px 28px; border-radius:12px; font-weight:600; font-size:15px;
    transition:transform .25s cubic-bezier(.2,.8,.2,1), box-shadow .25s, background .25s;
    cursor:pointer; border:1px solid transparent; white-space:nowrap;
  }
  .btn-primary{
    background:linear-gradient(135deg, var(--green), #00e676);
    color:#03150b;
    box-shadow:0 8px 30px -8px rgba(0,200,83,.55);
  }
  .btn-primary:hover{transform:translateY(-2px); box-shadow:0 14px 34px -8px rgba(0,200,83,.7);}
  .btn-ghost{
    background:rgba(255,255,255,0.04); border-color:var(--card-border); color:var(--text);
    backdrop-filter:blur(10px);
  }
  .btn-ghost:hover{background:rgba(255,255,255,0.09); transform:translateY(-2px);}

  .badge-soon{
    font-family:'JetBrains Mono',monospace; font-size:10.5px; letter-spacing:.1em;
    padding:3px 9px; border-radius:20px; border:1px solid rgba(255,193,7,.35);
    background:rgba(255,193,7,.08); color:#ffca28;
  }

  .glass{
    background:var(--card);
    border:1px solid var(--card-border);
    backdrop-filter:blur(16px);
    border-radius:20px;
  }

  /* ---------- Nav ---------- */
  #nav{
    position:fixed; top:0; left:0; right:0; z-index:100;
    padding:18px 0; transition:background .35s, border-color .35s, padding .35s;
    border-bottom:1px solid transparent;
  }
  #nav.scrolled{
    background:rgba(5,8,22,.75); backdrop-filter:blur(18px);
    border-bottom:1px solid var(--card-border); padding:12px 0;
  }
  #nav .wrap{display:flex; align-items:center; justify-content:space-between;}
  .logo{display:flex; align-items:center; gap:10px; font-weight:700; font-size:20px;}
  .logo-mark{
    width:34px; height:34px; border-radius:9px;
    background:linear-gradient(135deg, var(--blue), var(--green));
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 0 22px -4px rgba(0,200,83,.6);
  }
  .nav-links{display:flex; gap:2px; align-items:center;}
  .nav-links a{
    padding:9px 14px; border-radius:8px; font-size:14.5px; color:var(--muted);
    transition:color .2s, background .2s;
  }
  .nav-links a:hover{color:var(--text); background:rgba(255,255,255,.05);}
  .nav-cta{display:flex; align-items:center; gap:12px;}
  #menu-btn{display:none; background:none; border:none; color:var(--text); cursor:pointer;}
  #mobile-menu{
    display:none; position:fixed; inset:0 0 0 0; top:64px; z-index:99;
    background:rgba(5,8,22,.98); backdrop-filter:blur(20px);
    flex-direction:column; padding:20px 24px; gap:4px;
  }
  #mobile-menu.open{display:flex;}
  #mobile-menu a{padding:16px 6px; font-size:18px; border-bottom:1px solid var(--card-border);}

  /* progress bar */
  #progress{position:fixed; top:0; left:0; height:3px; background:linear-gradient(90deg,var(--blue),var(--green)); z-index:200; width:0%;}

  /* ---------- Hero ---------- */
  #hero{
    position:relative; min-height:100vh; display:flex; align-items:center;
    padding:150px 0 90px; overflow:hidden;
  }
  .bg-glow{
    position:absolute; border-radius:50%; filter:blur(110px); opacity:.35; pointer-events:none;
  }
  .glow1{width:600px; height:600px; background:var(--blue); top:-200px; left:-150px; animation:float1 14s ease-in-out infinite;}
  .glow2{width:520px; height:520px; background:var(--green); bottom:-180px; right:-120px; animation:float2 16s ease-in-out infinite;}
  @keyframes float1{0%,100%{transform:translate(0,0);}50%{transform:translate(60px,40px);}}
  @keyframes float2{0%,100%{transform:translate(0,0);}50%{transform:translate(-50px,-30px);}}

  .particles{position:absolute; inset:0; pointer-events:none;}
  .particle{
    position:absolute; width:3px; height:3px; border-radius:50%; background:var(--green);
    opacity:.5; animation:drift linear infinite;
  }
  @keyframes drift{
    0%{transform:translateY(0) translateX(0); opacity:0;}
    10%{opacity:.6;}
    90%{opacity:.4;}
    100%{transform:translateY(-120vh) translateX(40px); opacity:0;}
  }

  .hero-grid{display:grid; grid-template-columns:1.05fr .95fr; gap:60px; align-items:center; position:relative; z-index:2;}
  .hero-h1{font-size:clamp(40px,5.2vw,68px); line-height:1.05; font-weight:700; letter-spacing:-0.02em;}
  .hero-sub{margin-top:22px; font-size:18px; line-height:1.65; color:var(--muted); max-width:520px;}
  .hero-actions{display:flex; gap:14px; margin-top:34px; flex-wrap:wrap; align-items:center;}
  .hero-stats{display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-top:56px; max-width:560px;}
  .hstat{padding:14px 6px; border-radius:14px; text-align:left;}
  .hstat .n{font-family:'Space Grotesk'; font-weight:700; font-size:15px; color:var(--green);}
  .hstat .l{font-size:11.5px; color:var(--muted); margin-top:3px; line-height:1.3;}

  /* Phone mockup with route */
  .phone-stage{position:relative; display:flex; justify-content:center; align-items:center; height:600px;}
  .phone{
    width:290px; height:590px; border-radius:44px;
    background:linear-gradient(160deg,#0c1230,#050816);
    border:2px solid rgba(255,255,255,.12);
    box-shadow:0 40px 90px -30px rgba(0,0,0,.8), 0 0 60px -10px rgba(0,200,83,.25), inset 0 0 0 6px #0a0f22;
    position:relative; overflow:hidden;
    animation:phoneFloat 6s ease-in-out infinite;
  }
  @keyframes phoneFloat{0%,100%{transform:translateY(0) rotate(-1.5deg);}50%{transform:translateY(-16px) rotate(1.5deg);}}
  .phone-notch{position:absolute; top:14px; left:50%; transform:translateX(-50%); width:90px; height:20px; background:#000; border-radius:20px; z-index:5;}
  .phone-screen{position:absolute; inset:10px; border-radius:36px; overflow:hidden; background:radial-gradient(ellipse at 30% 20%, #10204a 0%, #050816 70%);}
  .route-svg{position:absolute; inset:0; width:100%; height:100%;}
  .route-path{
    fill:none; stroke:url(#routeGrad); stroke-width:4; stroke-linecap:round;
    stroke-dasharray:6 10; animation:dash 1.6s linear infinite;
  }
  @keyframes dash{to{stroke-dashoffset:-32;}}
  .pin{position:absolute; width:14px; height:14px;}
  .pin-dot{width:100%; height:100%; border-radius:50%; background:var(--green); box-shadow:0 0 0 0 rgba(0,200,83,.6); animation:pulse 2s ease-out infinite;}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(0,200,83,.55);}70%{box-shadow:0 0 0 16px rgba(0,200,83,0);}100%{box-shadow:0 0 0 0 rgba(0,200,83,0);}}
  .phone-ui{position:absolute; left:16px; right:16px; bottom:18px; padding:14px; border-radius:18px;}
  .phone-ui .eta{font-family:'Space Grotesk'; font-weight:700; font-size:20px; color:var(--green);}
  .phone-ui .sub{font-size:11.5px; color:var(--muted); margin-top:2px;}
  .float-card{
    position:absolute; padding:11px 14px; border-radius:14px; display:flex; align-items:center; gap:8px;
    font-size:12.5px; font-weight:600; animation:bob 5s ease-in-out infinite;
  }
  .fc1{top:60px; left:-30px; animation-delay:0s;}
  .fc2{bottom:120px; right:-36px; animation-delay:1.4s;}
  @keyframes bob{0%,100%{transform:translateY(0);}50%{transform:translateY(-14px);}}

  /* ---------- Trusted by ---------- */
  #trusted{padding:60px 0; border-top:1px solid var(--card-border); border-bottom:1px solid var(--card-border);}
  .trusted-label{text-align:center; font-size:12.5px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); margin-bottom:30px; font-family:'JetBrains Mono';}
  .trusted-row{display:flex; flex-wrap:wrap; justify-content:center; gap:14px;}
  .tbadge{display:flex; align-items:center; gap:9px; padding:11px 20px; font-size:14px; font-weight:500; color:var(--muted); transition:color .2s, transform .2s;}
  .tbadge:hover{color:var(--text); transform:translateY(-2px);}

  /* ---------- generic section ---------- */
  section{padding:120px 0; position:relative;}
  .section-head{max-width:680px; margin:0 auto 64px; text-align:center;}
  .section-head h2{font-size:clamp(30px,4vw,44px); font-weight:700; letter-spacing:-0.02em;}
  .section-head p{margin-top:16px; color:var(--muted); font-size:17px; line-height:1.6;}

  .reveal{opacity:0; transform:translateY(28px); transition:opacity .7s cubic-bezier(.2,.7,.2,1), transform .7s cubic-bezier(.2,.7,.2,1);}
  .reveal.in{opacity:1; transform:translateY(0);}

  /* ---------- Features ---------- */
  .feat-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:20px;}
  .feat-card{
    padding:30px 26px; transition:transform .3s, border-color .3s, background .3s;
    position:relative; overflow:hidden;
  }
  .feat-card:hover{transform:translateY(-6px); border-color:rgba(0,200,83,.4); background:rgba(255,255,255,.07);}
  .feat-icon{
    width:48px; height:48px; border-radius:13px; display:flex; align-items:center; justify-content:center;
    background:linear-gradient(135deg, rgba(13,71,161,.35), rgba(0,200,83,.25)); margin-bottom:18px;
    border:1px solid var(--card-border);
  }
  .feat-card h3{font-size:18px; font-weight:600; margin-bottom:8px; display:flex; align-items:center; gap:9px; flex-wrap:wrap;}
  .feat-card p{color:var(--muted); font-size:14.5px; line-height:1.6;}

  /* ---------- Why ADATRO ---------- */
  .why-grid{display:grid; grid-template-columns:1fr 1fr; gap:60px; align-items:center;}
  .why-list{display:flex; flex-direction:column; gap:22px;}
  .why-item{display:flex; gap:16px; align-items:flex-start;}
  .why-ic{width:38px; height:38px; border-radius:10px; background:rgba(0,200,83,.12); border:1px solid rgba(0,200,83,.3); display:flex; align-items:center; justify-content:center; flex-shrink:0; color:var(--green);}
  .why-item h4{font-size:16px; font-weight:600; margin-bottom:4px;}
  .why-item p{font-size:14px; color:var(--muted); line-height:1.55;}
  .why-visual{position:relative; height:420px; border-radius:24px; overflow:hidden; display:flex; align-items:center; justify-content:center;}
  .africa-glow{position:relative; width:280px; height:280px;}

  /* ---------- Roadmap ---------- */
  .roadmap{position:relative; max-width:900px; margin:0 auto;}
  .roadmap::before{content:''; position:absolute; left:19px; top:8px; bottom:8px; width:2px; background:linear-gradient(180deg, var(--blue), var(--green)); opacity:.4;}
  .road-item{position:relative; padding-left:60px; margin-bottom:44px;}
  .road-item:last-child{margin-bottom:0;}
  .road-dot{
    position:absolute; left:0; top:0; width:40px; height:40px; border-radius:50%;
    background:var(--bg2); border:2px solid var(--green); display:flex; align-items:center; justify-content:center;
    font-family:'Space Grotesk'; font-weight:700; font-size:13px; color:var(--green); z-index:2;
  }
  .road-item.future .road-dot{border-color:var(--muted); color:var(--muted);}
  .road-card{padding:24px 26px;}
  .road-card h3{font-size:19px; font-weight:700; margin-bottom:10px;}
  .road-tags{display:flex; gap:8px; flex-wrap:wrap;}
  .road-tags span{font-size:12.5px; padding:5px 12px; border-radius:20px; background:rgba(255,255,255,.05); border:1px solid var(--card-border); color:var(--muted);}

  /* ---------- AI Assistant ---------- */
  .ai-wrap{display:grid; grid-template-columns:.9fr 1.1fr; gap:60px; align-items:center;}
  .ai-orb{position:relative; height:340px; display:flex; align-items:center; justify-content:center;}
  .orb-core{
    width:160px; height:160px; border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #34e28a, var(--green) 40%, var(--blue) 100%);
    box-shadow:0 0 80px 10px rgba(0,200,83,.35);
    animation:orbPulse 3.5s ease-in-out infinite;
  }
  @keyframes orbPulse{0%,100%{transform:scale(1);}50%{transform:scale(1.08);}}
  .orb-ring{position:absolute; border:1px solid rgba(0,200,83,.3); border-radius:50%; animation:spin linear infinite;}
  .r1{width:220px; height:220px; animation-duration:12s;}
  .r2{width:280px; height:280px; animation-duration:20s; border-style:dashed;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .ai-command{padding:14px 18px; display:flex; align-items:center; gap:12px; margin-bottom:12px;}
  .ai-command .ic{color:var(--green); flex-shrink:0;}
  .ai-command span{font-size:14.5px; color:var(--text);}
  .lang-row{display:flex; gap:10px; margin-top:22px; flex-wrap:wrap;}
  .lang-chip{padding:8px 16px; border-radius:20px; font-size:13px; font-weight:600;}
  .lang-chip.active{background:linear-gradient(135deg,var(--blue),var(--green)); color:#fff;}
  .lang-chip:not(.active){background:rgba(255,255,255,.05); border:1px solid var(--card-border); color:var(--muted);}

  /* ---------- Stats ---------- */
  #stats{background:linear-gradient(180deg, transparent, rgba(13,71,161,.08), transparent); padding:100px 0;}
  .stat-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:24px; text-align:center;}
  .stat-num{font-family:'Space Grotesk'; font-weight:700; font-size:clamp(34px,4.5vw,52px);}
  .stat-label{color:var(--muted); font-size:14px; margin-top:8px;}

  /* ---------- Download ---------- */
  #download{text-align:center;}
  .store-row{display:flex; gap:16px; justify-content:center; flex-wrap:wrap; margin-top:36px;}
  .store-btn{padding:16px 26px; display:flex; align-items:center; gap:12px; min-width:210px; justify-content:flex-start;}
  .store-btn .txt{text-align:left;}
  .store-btn .txt small{display:block; font-size:11px; color:var(--muted);}
  .store-btn .txt strong{font-size:16px; font-family:'Space Grotesk';}
  .notify-form{display:flex; gap:10px; max-width:420px; margin:40px auto 0; flex-wrap:wrap; justify-content:center;}
  .notify-form input{
    flex:1; min-width:220px; padding:14px 18px; border-radius:12px; background:rgba(255,255,255,.04);
    border:1px solid var(--card-border); color:var(--text); font-size:14.5px;
  }
  .notify-form input:focus{border-color:var(--green);}

  /* ---------- Testimonials ---------- */
  .test-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:20px;}
  .test-card{padding:28px;}
  .test-stars{color:var(--green); margin-bottom:14px; display:flex; gap:2px;}
  .test-card p{font-size:14.5px; line-height:1.65; color:#dfe3f5; margin-bottom:20px;}
  .test-who{display:flex; align-items:center; gap:12px;}
  .test-avatar{width:40px; height:40px; border-radius:50%; background:linear-gradient(135deg,var(--blue),var(--green)); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:14px;}
  .test-who span{display:block; font-size:13.5px; font-weight:600;}
  .test-who small{color:var(--muted); font-size:12px;}

  /* ---------- FAQ ---------- */
  .faq-item{border-bottom:1px solid var(--card-border);}
  .faq-q{
    width:100%; text-align:left; padding:22px 4px; background:none; border:none; color:var(--text);
    font-size:16px; font-weight:600; display:flex; justify-content:space-between; align-items:center;
    cursor:pointer; gap:16px; font-family:'Space Grotesk';
  }
  .faq-q svg{transition:transform .3s; flex-shrink:0; color:var(--green);}
  .faq-item.open .faq-q svg{transform:rotate(45deg);}
  .faq-a{max-height:0; overflow:hidden; transition:max-height .35s ease, padding .35s ease;}
  .faq-item.open .faq-a{max-height:220px; padding-bottom:20px;}
  .faq-a p{color:var(--muted); font-size:14.5px; line-height:1.65; padding-right:30px;}

  /* ---------- Blog ---------- */
  .blog-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:22px;}
  .blog-card{overflow:hidden; transition:transform .3s;}
  .blog-card:hover{transform:translateY(-6px);}
  .blog-thumb{height:160px; position:relative; display:flex; align-items:center; justify-content:center;}
  .blog-body{padding:22px;}
  .blog-tag{font-size:11px; font-family:'JetBrains Mono'; text-transform:uppercase; letter-spacing:.08em; color:var(--green);}
  .blog-body h3{font-size:16.5px; margin:10px 0 8px; font-weight:600; line-height:1.4;}
  .blog-body p{font-size:13.5px; color:var(--muted); line-height:1.55;}

  /* ---------- Contact ---------- */
  .contact-grid{display:grid; grid-template-columns:1fr 1fr; gap:50px;}
  .contact-form{padding:34px; display:flex; flex-direction:column; gap:16px;}
  .field label{font-size:12.5px; color:var(--muted); margin-bottom:7px; display:block; font-weight:600;}
  .field input, .field textarea{
    width:100%; padding:13px 16px; border-radius:10px; background:rgba(255,255,255,.04);
    border:1px solid var(--card-border); color:var(--text); font-size:14.5px; font-family:'Inter';
  }
  .field input:focus, .field textarea:focus{border-color:var(--green);}
  .contact-info-card{padding:26px; display:flex; gap:16px; align-items:flex-start; margin-bottom:16px;}
  .contact-info-card .ic{width:42px; height:42px; border-radius:11px; background:rgba(0,200,83,.12); border:1px solid rgba(0,200,83,.3); display:flex; align-items:center; justify-content:center; color:var(--green); flex-shrink:0;}
  .contact-info-card h4{font-size:15px; margin-bottom:4px;}
  .contact-info-card p{font-size:13.5px; color:var(--muted);}
  .map-box{height:180px; border-radius:16px; position:relative; overflow:hidden; display:flex; align-items:center; justify-content:center; color:var(--muted); font-size:13px; gap:8px;}
  .social-row{display:flex; gap:10px; margin-top:16px;}
  .social-row a{width:40px; height:40px; border-radius:10px; display:flex; align-items:center; justify-content:center; transition:transform .2s, background .2s;}
  .social-row a:hover{transform:translateY(-3px); background:rgba(0,200,83,.15);}

  /* ---------- Footer ---------- */
  footer{border-top:1px solid var(--card-border); padding:70px 0 30px;}
  .foot-grid{display:grid; grid-template-columns:1.6fr 1fr 1fr 1fr; gap:40px; margin-bottom:56px;}
  .foot-brand p{color:var(--muted); font-size:14px; margin-top:14px; line-height:1.6;
